# NatureCo CLI Plugin: Urðr Memory
# version: 1.1.0
# description: Tree-structured persistent memory for NatureCo CLI agents
#
# NOTE: NatureCo ships a native tree-memory whose files already match Urðr's model
# (an index + 3 domain roots, `## branch` headings, dated leaves). This plugin binds
# Urðr's tooling (fallback search, health lint) to that native layout — it does NOT
# require renaming files. Root filenames below reflect NatureCo's actual on-disk names
# under ~/.natureco/memory/tree/<user>/.

plugin:
  name: urdr-memory
  version: 1.1.0
  type: memory
  author: Gencay
  license: MIT

  description: >
    Persistent, tree-structured memory (index + 3 domain roots, branches, leaves)
    for NatureCo CLI agents, with a fast hierarchical retrieval protocol, an LLM-free
    fallback search so information is never unreachable, and a health lint.

  # NatureCo's real tree layout (Turkish root names, as created by memory_tree.js).
  memory_dir: "~/.natureco/memory/tree/{{user}}"

  hooks:
    on_session_start:
      - action: load_memory
        path: "{{memory_dir}}"
        roots:
          - 0-index.md
          - 1-kisisel.md
          - 2-teknik.md
          - 3-kararlar.md
        protocols:
          - architecture.md
          - cross-cutting.md

    on_session_end:
      - action: save_memory
        path: "{{memory_dir}}"
        # Concurrency-safe: NatureCo runs multiple channels writing to one shared tree.
        writer: "scripts/append.mjs"   # advisory lock + atomic rename + append-only

  memory:
    roots:
      - name: 0-index
        file: 0-index.md
        description: Index / routing map (root → branch)
      - name: 1-kisisel
        file: 1-kisisel.md
        description: "Kişisel & Tercihler (People, preferences, identity)"
      - name: 2-teknik
        file: 2-teknik.md
        description: "Teknik & Projeler (Projects, systems, technical reference)"
      - name: 3-kararlar
        file: 3-kararlar.md
        description: "Kararlar, Kurallar & Dersler (Decisions, rules, lessons, pending)"

    # NatureCo's actual default branches (Turkish), created by memory_tree.js.
    default_branches:
      1-kisisel:
        - "## Kimlik"
        - "## Tercihler"
        - "## İletişim Kalıpları"
      2-teknik:
        - "## Projeler"
        - "## Kurulum & Sistem"
        - "## Teknik Referans"
      3-kararlar:
        - "## Bekleyen İşler"
        - "## Kararlar"
        - "## Kurallar & Kısıtlar"
        - "## Öğrenilen Dersler"
        - "## Tarihli Olaylar"

  commands:
    search:
      description: "Fallback search — used when the 4-step protocol can't locate a leaf"
      usage: "node scripts/search.mjs \"<keyword>\" {{memory_dir}}"
    lint:
      description: "Memory health audit (growth, index bloat, broken bkz:, duplicates)"
      usage: "node scripts/lint.mjs {{memory_dir}}"
    bench:
      description: "Benchmark retrieval recall + write fidelity at scale"
      usage: "node scripts/bench.mjs --leaves 300"

  protocols:
    architecture: "{{protocol_dir}}/architecture.md"
    cross-cutting: "{{protocol_dir}}/cross-cutting.md"
    growth-rules: "{{protocol_dir}}/growth-rules.md"
    hard-error: "{{protocol_dir}}/hard-error-protocol.md"

  dependencies: []
