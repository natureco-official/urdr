name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Rock 6D's MCP server is the repo's first real npm dependency (the SDK); selftest's
      # Rock 6D suite imports it directly, so it must be installed before any tests run.
      - name: Install dependencies
        run: npm ci

      # Every tool, exercised against a temp fixture — proves cross-platform behavior.
      - name: Self-test (all tools)
        run: node scripts/selftest.mjs

      # selftest includes the Rock 2 migrate/init behavior suite and Rock 3 golden policy suite.
      # Keep the entry-point checks explicit so packaging/path regressions are easy to diagnose.
      - name: Migration CLI entry point
        run: node scripts/migrate.mjs --help

      - name: Init CLI entry point
        run: bash scripts/init.sh --help
        shell: bash

      # Benchmark doubles as a guard: exits non-zero on any write-fidelity loss.
      - name: Benchmark (fidelity + recall guard)
        run: node scripts/bench.mjs --leaves 200 --ambiguity 0.3

      # Parse and evaluate lint's contract, rather than merely checking for a crash.
      - name: Evaluate lint output on templates
        shell: bash
        run: |
          node scripts/lint.mjs templates --json > lint-result.json
          node -e "const r=require('./lint-result.json'); if(r.errors) { console.error(r); process.exit(1) }; console.log('lint evaluated:',r.errors,'errors,',r.warnings,'warnings')"

      - name: Check documentation references
        run: node scripts/lib/doc-check.mjs .
